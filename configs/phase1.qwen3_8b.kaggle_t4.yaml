      load_in_4bit: true
      bnb_4bit_compute_dtype: float16
      bnb_4bit_quant_type: nf4
      bnb_4bit_use_double_quant: true
  max_new_tokens: 64

pass_criteria:
  min_suppressed_asr: 0.80
  max_clean_asr: 0.10

checkpoint: true

outputs:
  root: /kaggle/working/artifacts/phase1
  run_name: kaggle_t4_run

backend:
  name: transformers
  transformers:
    device_map: auto
    low_cpu_mem_usage: true
